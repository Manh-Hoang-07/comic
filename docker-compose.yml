  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comic-api
    # depend_on redis removed as it is now external (Upstash)
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      GLOBAL_PREFIX: ${GLOBAL_PREFIX}
      CORS_ENABLED: ${CORS_ENABLED}
      CORS_ORIGINS: ${CORS_ORIGINS}
      APP_TIMEZONE: ${APP_TIMEZONE}

      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: ${REDIS_URL}
      CACHE_DRIVER: ${CACHE_DRIVER}

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}

      STORAGE_TYPE: ${STORAGE_TYPE}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE}
      STORAGE_S3_BASE_URL: ${STORAGE_S3_BASE_URL}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      GOOGLE_FRONTEND_URL: ${GOOGLE_FRONTEND_URL}

      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "8000:8000"

